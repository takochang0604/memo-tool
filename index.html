<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>備忘錄｜MEMO SPACE</title>
  <meta name="description" content="功能強大的個人備忘錄工具，支援圖片上傳、拖曳排序、帳號管理，讓你的靈感與記憶安全保存在雲端。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== 全域推薦內容側邊欄 ========== -->
  <div class="ad-sidebar open" id="ad-sidebar">
    <button class="ad-toggle" id="ad-toggle" title="推薦內容">
      <span class="ad-toggle-icon">⭐</span>
      <span class="ad-toggle-close">✕</span>
    </button>
    <div class="ad-panel">
      <div class="ad-panel-header">
        <span class="ad-panel-title">⭐ 推薦內容</span>
      </div>
      <div class="ad-panel-body">
        <a class="ad-card" href="https://www.twainews.com.tw/" target="_blank" rel="noopener noreferrer">
          <div class="ad-card-icon">
            <img src="https://firebasestorage.googleapis.com/v0/b/memorandum-3abaa.firebasestorage.app/o/Gemini_Generated_Image_pnl4g6pnl4g6pnl4-removebg-preview.png?alt=media&token=bc2f8c80-d0c5-4405-90b9-19e7eb9cfdef" alt="TWAI NEWS">
          </div>
          <div class="ad-card-info">
            <span class="ad-card-name">TWAI NEWS</span>
            <span class="ad-card-desc">前往最新AI新聞</span>
          </div>
          <span class="ad-card-arrow">›</span>
        </a>
        <a class="ad-card" href="https://www.gametower.com.tw/games/pg/?utm_source=twainews&utm_medium=display&utm_campaign=mega_traffic_2026&utm_content=1st_banner" target="_blank" rel="noopener noreferrer">
          <div class="ad-card-icon">
            <img src="https://firebasestorage.googleapis.com/v0/b/memorandum-3abaa.firebasestorage.app/o/%E7%8E%A9%E6%98%9F%E6%B4%BE%E5%B0%8D.png?alt=media&token=a0d005bf-bd6c-44b4-9402-0290fafc3581" alt="玩星派對">
          </div>
          <div class="ad-card-info">
            <span class="ad-card-name">玩星派對</span>
            <span class="ad-card-desc">立即前往遊戲</span>
          </div>
          <span class="ad-card-arrow">›</span>
        </a>
        <a class="ad-card" href="https://cmj2.com.tw/?utm_source=twainews&utm_medium=display&utm_campaign=mega_traffic_2026&utm_content=2nd_banner" target="_blank" rel="noopener noreferrer">
          <div class="ad-card-icon">
            <img src="https://firebasestorage.googleapis.com/v0/b/memorandum-3abaa.firebasestorage.app/o/%E7%AB%B6%E6%8A%80%E9%BA%BB%E5%B0%872.png?alt=media&token=4e424ebb-f006-4bab-80dd-74a152b4b833" alt="競技麻將2">
          </div>
          <div class="ad-card-info">
            <span class="ad-card-name">競技麻將2</span>
            <span class="ad-card-desc">立即前往遊戲</span>
          </div>
          <span class="ad-card-arrow">›</span>
        </a>
      </div>
      <div class="ad-panel-badge">廣告</div>
    </div>
  </div>

  <!-- ========== 主頁面容器 ========== -->
  <div id="app">

    <!-- ── 登入/註冊頁面 ── -->
    <div id="auth-page" class="page active">
      <div class="auth-bg">
        <div class="auth-blob blob1"></div>
        <div class="auth-blob blob2"></div>
        <div class="auth-blob blob3"></div>
      </div>
      <div class="auth-container">
        <div class="auth-logo">
          <div class="logo-icon">📝</div>
          <h1 class="logo-title">MEMO SPACE</h1>
          <p class="logo-subtitle">你的個人雲端備忘錄</p>
        </div>

        <!-- 頁籤切換 -->
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</button>
          <button class="auth-tab" id="tab-register" onclick="switchTab('register')">註冊</button>
        </div>

        <!-- 登入表單 -->
        <div id="form-login" class="auth-form active">
          <div class="form-group">
            <label class="form-label" for="login-username">帳號</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="login-username" class="form-input" placeholder="請輸入帳號" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">密碼</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="login-password" class="form-input" placeholder="請輸入密碼" autocomplete="current-password">
              <button class="toggle-pw" onclick="togglePassword('login-password')" type="button">👁</button>
            </div>
          </div>
          <button class="btn-primary btn-full" id="btn-login" onclick="handleLogin()">
            <span class="btn-text">登入</span>
          </button>
        </div>

        <!-- 註冊表單 -->
        <div id="form-register" class="auth-form">
          <div class="form-group">
            <label class="form-label" for="reg-username">帳號</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="reg-username" class="form-input" placeholder="4-20 個英數字" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">密碼</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg-password" class="form-input" placeholder="至少 6 個字元" autocomplete="new-password">
              <button class="toggle-pw" onclick="togglePassword('reg-password')" type="button">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-confirm">確認密碼</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="reg-confirm" class="form-input" placeholder="再次輸入密碼" autocomplete="new-password">
              <button class="toggle-pw" onclick="togglePassword('reg-confirm')" type="button">👁</button>
            </div>
          </div>
          <button class="btn-primary btn-full" id="btn-register" onclick="handleRegister()">
            <span class="btn-text">建立帳號</span>
          </button>
        </div>

        <div id="auth-message" class="auth-message"></div>

        <!-- 計數器（登入頁顯示） -->
        <div class="counter-wrapper" id="counter-wrapper-auth">
          <span class="counter-badge" id="counter-auth">
            <span class="counter-eye">👁</span>
            <span class="counter-label">瀏覽人次</span>
            <span class="counter-num" id="counter-num-auth">--</span>
          </span>
        </div>
      </div>
    </div>

    <!-- ── 主頁面（筆記列表） ── -->
    <div id="main-page" class="page">
      <!-- 頂部導覽 -->
      <header class="main-header">
        <div class="header-left">
          <div class="header-logo">📝</div>
          <span class="header-title">MEMO SPACE</span>
        </div>
        <div class="header-center">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="search-input" placeholder="搜尋筆記..." oninput="handleSearch()">
            <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
          </div>
        </div>
        <div class="header-right">
          <span class="user-badge" id="user-badge"></span>

          <button class="btn-logout-text" onclick="handleLogout()" id="btn-logout">
            <svg class="logout-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span class="logout-label">登出</span>
          </button>
        </div>
      </header>

      <!-- 篩選與排序列 -->
      <div class="filter-bar">
        <div class="filter-tags" id="filter-tags">
          <button class="filter-tag active" onclick="filterByTag('all')">全部</button>
        </div>
        <div class="sort-controls">
          <select class="sort-select" id="sort-select" onchange="handleSort()">
            <option value="manual">自訂排序</option>
            <option value="newest">最新建立</option>
            <option value="oldest">最舊建立</option>
            <option value="updated">最近更新</option>
          </select>
        </div>
      </div>

      <!-- 筆記網格 -->
      <main class="main-content">
        <div id="notes-grid" class="notes-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">📋</div>
          <h3 class="empty-title">還沒有任何筆記</h3>
          <p class="empty-desc">點擊右上角的 ＋ 按鈕建立你的第一篇筆記！</p>
          <button class="btn-primary" onclick="showNewNoteModal()">立即建立筆記</button>
        </div>
      </main>

      <!-- Footer：計數器 -->
      <footer class="main-footer">
        <div class="counter-wrapper" id="counter-wrapper-main">
          <span class="counter-badge">
            <span class="counter-eye">👁</span>
            <span class="counter-label">瀏覽人次</span>
            <span class="counter-num" id="counter-num-main">--</span>
          </span>
        </div>
      </footer>
    </div>

    <!-- 悉浮新增按鈕 FAB -->
    <button class="fab-add" onclick="showNewNoteModal()" id="fab-btn" title="新增筆記">＋</button>

  </div><!-- end #app -->


  <!-- ========== 新增/編輯筆記彈窗 ========== -->
  <div class="modal-overlay" id="note-modal" onclick="closeModalOutside(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">新增筆記</h2>
        <button class="modal-close" onclick="closeNoteModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="note-title">標題 <span class="required">*</span></label>
          <input type="text" id="note-title" class="form-input" placeholder="為這篇筆記取個名字..." maxlength="100">
        </div>
        <div class="form-group">
          <label class="form-label" for="note-tag">標籤</label>
          <input type="text" id="note-tag" class="form-input" placeholder="例如：工作、生活、學習...（選填）" maxlength="20" list="tag-datalist" autocomplete="off">
          <datalist id="tag-datalist"></datalist>

        </div>
        <div class="form-group">
          <label class="form-label" for="note-content">內容</label>
          <textarea id="note-content" class="form-textarea" placeholder="在這裡寫下你的想法..." rows="6"></textarea>
        </div>

        <!-- 圖片上傳區 -->
        <div class="form-group">
          <label class="form-label">圖片 <small class="form-hint">（最多 5 張，每張限 10MB）</small></label>
          <div class="upload-area" id="upload-area" onclick="triggerUpload()" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
            <div class="upload-placeholder" id="upload-placeholder">
              <span class="upload-icon">🖼</span>
              <span class="upload-text">點擊或拖曳圖片到這裡</span>
              <span class="upload-hint">支援 JPG、PNG、GIF、WebP</span>
            </div>
            <input type="file" id="image-input" multiple accept="image/*" style="display:none" onchange="handleImageSelect(event)">
          </div>
          <div class="image-preview-grid" id="image-preview-grid"></div>
          <div class="upload-progress" id="upload-progress" style="display:none">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span class="progress-text" id="progress-text">上傳中...</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeNoteModal()">取消</button>
        <button class="btn-primary" id="btn-save-note" onclick="saveNote()">
          <span class="btn-text">儲存筆記</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ========== 筆記詳情彈窗 ========== -->
  <div class="modal-overlay" id="detail-modal" onclick="closeDetailOutside(event)">
    <div class="modal-box modal-box-detail">
      <div class="modal-header">
        <h2 class="modal-title" id="detail-title">筆記詳情</h2>
        <div class="modal-header-actions">
          <button class="btn-icon-sm" onclick="editCurrentNote()" title="編輯">✏️</button>
          <button class="btn-icon-sm btn-danger-sm" onclick="deleteCurrentNote()" title="刪除">🗑</button>
          <button class="modal-close" onclick="closeDetailModal()">✕</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="detail-tag" id="detail-tag"></div>
        <div class="detail-content" id="detail-content"></div>
        <div class="detail-images" id="detail-images"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
    </div>
  </div>

  <!-- ========== 刪除確認彈窗 ========== -->
  <div class="modal-overlay" id="confirm-modal" onclick="closeConfirmModal()">
    <div class="modal-box modal-box-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">確認刪除</h2>
      </div>
      <div class="modal-body">
        <p class="confirm-text">確定要刪除這篇筆記嗎？此操作無法還原。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeConfirmModal()">取消</button>
        <button class="btn-danger" id="btn-confirm-delete" onclick="confirmDelete()">確認刪除</button>
      </div>
    </div>
  </div>

  <!-- ========== Toast 通知 ========== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ========== Firebase SDK ========== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <!-- ========== SortableJS ========== -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <!-- ========== 應用程式主體 ========== -->
  <script src="app.js"></script>

  <!-- ========== 廣告側邊欄初始化 ========== -->
  <script>
    (function initAdSidebar() {
      const sidebar = document.getElementById('ad-sidebar');
      const toggle  = document.getElementById('ad-toggle');
      if (!sidebar || !toggle) return;
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        sidebar.classList.toggle('open');
      });
      document.addEventListener('click', function(e) {
        if (!sidebar.contains(e.target)) {
          sidebar.classList.remove('open');
        }
      });
    })();
  </script>

</body>
</html>
